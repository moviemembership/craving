<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 • Nayya</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            background:#ead7ca;

            background-image:url("https://raw.githubusercontent.com/moviemembership/craving/refs/heads/main/ChatGPT%20Image%20Jun%2018%2C%202026%20at%2003_48_11%20AM.png");

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;

            padding:25px;

        }

        .card{

            width:100%;
            max-width:560px;

            background:rgba(255,250,240,.93);

            border-radius:32px;

            padding:55px 45px;

            text-align:center;

            box-shadow:0 18px 45px rgba(0,0,0,.10);

        }

        .logo{

            width:240px;

            max-width:85%;

            margin-bottom:25px;

        }

        .number{

            font-size:90px;

            font-weight:600;

            color:#4b403b;

            line-height:1;

        }

        h1{

            margin-top:18px;

            font-size:34px;

            font-weight:500;

            color:#4b403b;

        }

        p{

            margin-top:18px;

            color:#756962;

            line-height:1.8;

            font-size:16px;

        }

        .btn{

            display:inline-block;

            margin-top:35px;

            background:#aeb2a6;

            color:white;

            text-decoration:none;

            padding:16px 42px;

            border-radius:40px;

            transition:.3s;

            letter-spacing:2px;

            font-weight:500;

        }

        .btn:hover{

            background:#9ea295;

        }

        @media(max-width:768px){

            .card{

                padding:40px 25px;

            }

            .number{

                font-size:70px;

            }

            h1{

                font-size:28px;

            }

            p{

                font-size:15px;

            }

        }

    </style>

</head>

<body>

<div class="card">

    <img
        src="{{ url_for('static', filename='nayya-logo.png') }}"
        class="logo"
    >

    <div class="number">
        404
    </div>

    <h1>
        Page Not Found
    </h1>

    <p>

        Oops! It looks like this page doesn't exist or may have been moved.

        <br><br>

        Let's take you back to Nayya.

    </p>

    <a href="/" class="btn">

        BACK TO HOME

    </a>

</div>

</body>

</html>
